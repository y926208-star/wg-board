version: v2.0

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: docker
    steps:
      - checkout: self
      - run: |
          echo "=== 打包 WG看板 静态文件 ==="
          mkdir -p dist
          cp index.html dist/
          cp materials.json dist/
          cp board_data.json dist/
          cp -r imgs dist/
          echo "打包完成，文件列表："
          ls -la dist/
      - name: 归档构件
        uses: UploadArtifactory@4.*
        with:
          filePath: "dist/**"
          repoName: pipeline
